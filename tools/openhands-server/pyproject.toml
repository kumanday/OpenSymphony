[project]
name = "opensymphony-openhands-server"
version = "0.0.0"
description = "Bootstrap placeholder for the pinned local OpenHands agent-server environment."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
agent-server = [
  "openhands-agent-server-placeholder==0+bootstrap.placeholder",
]

[tool.opensymphony.openhands_server]
module = "openhands.agent_server"
launcher = "uv run --directory . --locked --extra agent-server --module openhands.agent_server"
